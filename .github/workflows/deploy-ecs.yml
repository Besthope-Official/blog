name: Deploy to ECS

permissions:
  contents: read

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-ecs
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ECS_PORT: ${{ secrets.ECS_PORT }}
      ECS_APP_ROOT: ${{ vars.ECS_APP_ROOT }}
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      KEEP_RELEASES: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build

      - name: Configure SSH
        shell: bash
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          printf '%s\n' "${{ secrets.ECS_KNOWN_HOSTS }}" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pack and transfer release
        shell: bash
        run: |
          set -eu
          PORT="${ECS_PORT:-22}"
          APP_ROOT="${ECS_APP_ROOT:-/var/www/besthope-blog}"
          RELEASE_DIR="$APP_ROOT/releases/$GITHUB_SHA"
          SSH_OPTS="-p $PORT -o ConnectTimeout=30 -o ServerAliveInterval=60 -o ServerAliveCountMax=10"

          tar cf - -C dist . | gzip -9 | ssh $SSH_OPTS \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
            "mkdir -p '$RELEASE_DIR' && tar xzf - -C '$RELEASE_DIR'"

      - name: Activate release
        shell: bash
        run: |
          set -eu
          PORT="${ECS_PORT:-22}"
          APP_ROOT="${ECS_APP_ROOT:-/var/www/besthope-blog}"
          RELEASES_DIR="$APP_ROOT/releases"
          RELEASE_DIR="$RELEASES_DIR/$GITHUB_SHA"
          CURRENT_LINK="$APP_ROOT/current"
          KEEP_RELEASES_COUNT="${KEEP_RELEASES:-5}"

          ssh -p "$PORT" "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" "\
            set -eu
            ln -sfn '$RELEASE_DIR' '$CURRENT_LINK'
            if [ -d '$RELEASES_DIR' ]; then
              find '$RELEASES_DIR' -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
                | sort -nr \
                | awk 'NR > '"\$KEEP_RELEASES_COUNT"' { print \$2 }' \
                | xargs -r rm -rf --
            fi
          "
